<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신우정 - Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Noto+Sans+KR:wght@100;300;500&display=swap" rel="stylesheet">

    <style>
        /* 기본 설정 */
        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #FFFFFF; color: #4A4036; overflow-x: hidden; }

        /* 상단 네비게이션 */
        .navbar { position: fixed; top: 0; width: 100%; display: flex; justify-content: flex-end; padding: 30px 8%; z-index: 1000; }
        .nav-link { text-decoration: none; color: #A6978A; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; margin-left: 30px; letter-spacing: 0.1rem; transition: 0.3s; }
        .nav-link:hover { color: #4A4036; }

        /* 스크롤 애니메이션 */
        .fade-in { opacity: 0; transform: translateY(50px); transition: all 0.8s ease-out; }
        .fade-in.is-visible { opacity: 1; transform: translateY(0); }

        /* 메인 섹션 */
        .hero-section { display: flex; align-items: center; justify-content: flex-start; height: 100vh; padding-left: 12%; position: relative; }
        .container { max-width: 800px; }
        .title-text h1 { font-size: 3.5rem; font-weight: 100; line-height: 1.3; margin-bottom: 20px; }
        .title-text strong { font-weight: 500; color: #2D2620; }
        .description-text { color: #A6978A; font-size: 1.1rem; margin-bottom: 30px; }
        
        .button-group { display: flex; gap: 15px; }
        .nav-btn { font-family: 'Montserrat'; padding: 15px 30px; border: 1px solid #EAE2D8; border-radius: 50px; text-decoration: none; color: #6B5E51; font-size: 0.8rem; transition: 0.5s; }
        .nav-btn:hover { background-color: #FDFBFA; border-color: #D9C5B2; transform: translateY(-3px); }

        /* 아래 화살표 */
        .scroll-down { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #D9C5B2; font-size: 0.8rem; }
        .arrow { width: 15px; height: 15px; border-bottom: 2px solid #D9C5B2; border-right: 2px solid #D9C5B2; transform: rotate(45deg); margin-top: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0) rotate(45deg); } 40% { transform: translateY(-10px) rotate(45deg); } }

        /* 활동 섹션 */
        .activity-section { padding: 150px 12%; background-color: #FDFBFA; min-height: 100vh; }
        .activity-card { margin-bottom: 80px; padding-left: 30px; }
        .activity-card h3 { font-size: 1.6rem; font-weight: 500; margin-bottom: 10px; color: #4A4036; }
        .activity-card p { font-weight: 300; line-height: 1.8; color: #6B5E51; }
    </style>
</head>
<body>

    <script>
        window.history.scrollRestoration = 'manual';
        window.onload = () => { window.scrollTo(0, 0); };
    </script>

    <nav class="navbar">
        <a href="index.html" class="nav-link">HOME</a>
        <a href="#activities" class="nav-link">WORK</a>
        <a href="mailto:shinwooj05@dongyang.ac.kr" class="nav-link">CONTACT</a>
    </nav>

    <section class="hero-section">
        <div class="container">
            <div class="title-text">
                <h1>안녕하세요,<br><strong>신우정</strong>입니다.</h1>
            </div>
            <div class="description-text">동양미래대 로봇소프트웨어과 2학년</div>
            <div class="button-group">
                <a href="https://www.dongyang.ac.kr" class="nav-btn" target="_blank">DMU</a>
                <a href="history.html" class="nav-btn">LIFE</a>
            </div>
        </div>

        <a href="#activities" class="scroll-down">
            <span>SCROLL</span>
            <div class="arrow"></div>
        </a>
    </section>

    <section id="activities" class="activity-section">
        <div class="fade-in">
            <h2 style="font-family: 'Montserrat'; font-size: 2rem; margin-bottom: 50px; color: #BCA895;">ACTIVITIES</h2>
        </div>
        
        <div class="fade-in activity-card">
            <h3>자율주행 로봇 제어 프로젝트</h3>
            <p>ROS(Robot Operating System) 기반 장애물 회피 알고리즘 구현 및 라이다 센서 데이터 분석</p>
        </div>

        <div class="fade-in activity-card">
            <h3>임베디드 시스템 설계</h3>
            <p>C/C++ 기반 실시간 데이터 처리 시스템 구축 및 마이크로컨트롤러 제어</p>
        </div>

        <div class="fade-in activity-card">
            <h3>로봇 소프트웨어 경진대회</h3>
            <p>팀 협업을 통한 로봇 경로 최적화 및 비전 인식 기능 고도화</p>
        </div>
    </section>

    <script>
        // 스크롤 시 반복 애니메이션 적용
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) { entry.target.classList.add('is-visible'); }
                else { entry.target.classList.remove('is-visible'); }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-in').forEach(element => {
            observer.observe(element);
        });
    </script>
</body>
</html>
